<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>Rock Paper Scissors</title>
</head>

<body>
    <header>
        <h1 class="title"><span class="purple-color">Rock </span><span class="green-color"> Paper </span><span class="red-color"> Scissors</span></h1>
        <p>The classic test of Man vs Machine</p>
    </header>

    <main>
        <h4>Your Choice</h4>
        <div class="user-content">
            <input type="image" id="rock" class="button rock-button" src="images/hand-back-fist-regular.svg">
            <input type="image" id="paper" class="button paper-button" src="images/hand-regular.svg">
            <input type="image" id="scissors" class="button scissors-button" src="images/hand-scissors-regular.svg">
        </div>

        <img src="images/separator.jpg" id="separator" class="separator">

        <div class="game-output grey-border">
            <div class="computer-content grey-border-right">
                <h4>Computer Choice</h4>
                <img src="images/circle-question-solid.svg" id= "computer-button">
            </div>
            <div class="results-content">
                <div class="data">
                    <h4>Round: <span id="round-count"></span></h4>
                    <h4>Your Score: <span id="user-score"></span></h4>
                    <h4>Computer Score: <span id="computer-score"></span></h4>
                </div>
                <div class="text">
                    <p id="result">Anything could happen...</p>
                </div>
            </div>
        </div>

        <div class="play-again">
            <button id="play-again-button">Play Again</button>
        </div>
    </main>

    <footer>
        <p>Created by Marcaroni3d</p>
    </footer>
    
    <script src="script.js"></script>
</body>

</html>
